name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork with upstream
        run: gh repo sync nano-innovation-technology/restful-api-guidelines --source ppzxc/restful-api-guidelines --force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
